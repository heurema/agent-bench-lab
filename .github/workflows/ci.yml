name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Validate tasks
        run: make validate

      - name: Run tests
        run: make test

      - name: Run smoke scoring
        run: make smoke

      - name: Run compare smoke
        run: make compare-smoke

      - name: Run IF-01 smoke
        run: make if01-smoke

      - name: Run DATA-01 smoke
        run: make data01-smoke

      - name: Run DOC-01 smoke
        run: make doc01-smoke

      - name: Run leak check
        run: make leak-check

      - name: Ruff
        run: python -m ruff check .
